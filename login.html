<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
/* Reset & basic styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    min-height: 100vh;
    background: #f2f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Navbar full width */
.navbar {
    width: 100%;
    background: #4CAF50;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar h2 {
    color: white;
    font-size: 24px;
}

.navlinks {
    display: flex;
    flex-wrap: wrap;
}

.navlinks a {
    margin-left: 10px;
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: 0.3s;
}

.navlinks a:hover,
.navlinks a.active {
    background: #3d9140;
    border-color: white;
}

/* Form container */
.form-box {
    width: 90%;
    max-width: 450px;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    margin-top: 40px;
}

.form-box h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #333;
    font-size: 28px;
}

/* Form elements */
.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #4CAF50;
    outline: none;
}

.btn {
    width: 100%;
    padding: 14px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 17px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.btn:hover {
    background: #3d9140;
}

/* Responsive navbar & form */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        align-items: flex-start;
    }
    .navlinks a {
        margin: 5px 5px 0 0;
    }
    .form-box {
        width: 95%;
        padding: 30px;
    }
}
</style>
</head>

<body>


<!-- Login Form -->
<div class="form-box">
    
    <h2>Login</h2>
    <form method="POST" autocomplete="off">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="name" placeholder="Name" required autocomplete="new-password">
        </div>
        <div class="input-group">
            <input type="password" name="pass" placeholder="Password" required autocomplete="new-password">
        </div>

        <!-- Registration link -->
        <div style="margin-bottom: 20px; text-align: right; font-size: 14px;margin-right:100px">
            <span>Not registered? <a href="{% url 'reg' %}" style="color: #4CAF50; text-decoration: none;">Register here</a></span>
        </div>

        <button class="btn">Login</button>
    </form>
</div>

</body>
</html>
